<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="author" content="ClothingVault" />
    <meta name="robots" content="index, follow, max-image-preview:large" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />

      property="og:title"

      property="og:description"

      property="og:image"
      content="https://www.clothingvault.in/logo.png"
    />

    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="ClothingVault | Women's Dresses, Western Wear & Trendy Fashion Online"
    />
    <meta
      name="twitter:description"
      content="Shop women's dresses, co-ord sets, tops and premium fashion online."
    />
    <meta
      name="twitter:image"
      content="https://www.clothingvault.in/logo.png"
    />
